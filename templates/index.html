<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX support in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [count, setCount] = React.useState(0);

            return (
                <div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full text-center">
                    <h1 class="text-3xl font-bold text-blue-600 mb-4">{{ title }}</h1>
                    <p class="text-gray-600 mb-6">{{ message }}</p>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                        <p className="text-sm text-gray-500 mb-2">React Interactive Counter</p>
                        <div className="text-4xl font-mono font-bold text-gray-800 mb-4">{count}</div>
                        <button 
                            onClick={() => setCount(count + 1)}
                            className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full transition duration-200"
                        >
                            Increment
                        </button>
                    </div>

                    <div class="bg-blue-50 p-4 rounded-md border border-blue-100">
                        <span class="text-sm font-medium text-blue-800">Status: Online (React Active)</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
