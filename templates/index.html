<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [isLoggedIn, setIsLoggedIn] = React.useState(!!localStorage.getItem('token'));
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);
            const [userProfile, setUserProfile] = React.useState(null);

            // Health State
            const [healthRecords, setHealthRecords] = React.useState([]);
            const [healthPage, setHealthPage] = React.useState(0);
            const [healthForm, setHealthForm] = React.useState({
                date: new Date().toISOString().split('T')[0],
                height: '',
                weight: '',
                bp_systolic: '',
                bp_diastolic: ''
            });

            React.useEffect(() => {
                if (isLoggedIn) {
                    fetchUserProfile();
                    fetchHealthRecords();
                }
            }, [isLoggedIn, healthPage]);

            const fetchUserProfile = async () => {
                const token = localStorage.getItem('token');
                try {
                    const response = await fetch('/api/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        setUserProfile(data);
                    } else {
                        handleLogout();
                    }
                } catch (err) {
                    handleLogout();
                }
            };

            const fetchHealthRecords = async () => {
                const token = localStorage.getItem('token');
                try {
                    const response = await fetch(`/api/health?skip=${healthPage * 5}&limit=5`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        setHealthRecords(data);
                    }
                } catch (err) {
                    console.error("Failed to fetch records", err);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoading(true);
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);

                try {
                    const response = await fetch('/token', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if (response.ok) {
                        localStorage.setItem('token', data.access_token);
                        setIsLoggedIn(true);
                    } else {
                        setError(data.detail || 'Login failed');
                    }
                } catch (err) {
                    setError('An error occurred. Please try again.');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleHealthSubmit = async (e) => {
                e.preventDefault();
                const token = localStorage.getItem('token');
                try {
                    const response = await fetch('/api/health', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(healthForm)
                    });
                    if (response.ok) {
                        fetchHealthRecords();
                        setHealthForm({
                            ...healthForm,
                            weight: '',
                            bp_systolic: '',
                            bp_diastolic: ''
                        });
                    }
                } catch (err) {
                    console.error("Failed to save record", err);
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('token');
                setIsLoggedIn(false);
                setUserProfile(null);
                setHealthRecords([]);
            };

            const getBMICategoryColor = (category) => {
                switch(category) {
                    case 'Normal weight': return 'text-green-600 font-bold';
                    case 'Underweight': return 'text-yellow-600 font-bold';
                    case 'Overweight': return 'text-orange-600 font-bold';
                    case 'Obese': return 'text-red-600 font-bold';
                    default: return 'text-gray-600';
                }
            };

            if (isLoggedIn) {
                return (
                    <div className="max-w-4xl mx-auto p-4 md:p-8">
                        <div className="flex justify-between items-center mb-8">
                            <h1 className="text-2xl font-bold text-blue-600">Personal Monitor</h1>
                            <div className="flex items-center gap-4">
                                <span className="text-sm text-gray-600">Hi, {userProfile?.username}</span>
                                <button onClick={handleLogout} className="text-sm text-red-500 hover:underline">Logout</button>
                            </div>
                        </div>

                        {/* Health Monitoring Section */}
                        <div className="bg-white rounded-lg shadow-md p-6 mb-8 border-l-4 border-blue-500">
                            <h2 className="text-xl font-semibold mb-4 flex items-center gap-2">
                                🩺 Health Monitor
                            </h2>
                            
                            <form onSubmit={handleHealthSubmit} className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                <div className="md:col-span-1">
                                    <label className="block text-xs font-medium text-gray-500">Date</label>
                                    <input type="date" required className="w-full p-2 border rounded text-sm" 
                                        value={healthForm.date} onChange={e => setHealthForm({...healthForm, date: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-500">Height (cm)</label>
                                    <input type="number" step="0.1" required placeholder="e.g. 175" className="w-full p-2 border rounded text-sm" 
                                        value={healthForm.height} onChange={e => setHealthForm({...healthForm, height: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-500">Weight (kg)</label>
                                    <input type="number" step="0.1" required placeholder="e.g. 70" className="w-full p-2 border rounded text-sm" 
                                        value={healthForm.weight} onChange={e => setHealthForm({...healthForm, weight: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-500">BP Systolic</label>
                                    <input type="number" placeholder="Optional" className="w-full p-2 border rounded text-sm" 
                                        value={healthForm.bp_systolic} onChange={e => setHealthForm({...healthForm, bp_systolic: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-500">BP Diastolic</label>
                                    <input type="number" placeholder="Optional" className="w-full p-2 border rounded text-sm" 
                                        value={healthForm.bp_diastolic} onChange={e => setHealthForm({...healthForm, bp_diastolic: e.target.value})} />
                                </div>
                                <div className="flex items-end">
                                    <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded text-sm font-bold hover:bg-blue-700 transition">
                                        Add Record
                                    </button>
                                </div>
                            </form>

                            {/* Records Table */}
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm border-collapse">
                                    <thead>
                                        <tr className="bg-gray-50 text-gray-600 uppercase text-xs font-bold">
                                            <th className="p-3">Date</th>
                                            <th className="p-3">Wt (kg)</th>
                                            <th className="p-3">BP</th>
                                            <th className="p-3">BMI</th>
                                            <th className="p-3">Category</th>
                                            <th className="p-3">Advice</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {healthRecords.map(r => (
                                            <tr key={r.id} className="hover:bg-gray-50">
                                                <td className="p-3">{r.date}</td>
                                                <td className="p-3 font-medium">{r.weight}</td>
                                                <td className="p-3">
                                                    {r.bp_systolic && r.bp_diastolic 
                                                        ? `${r.bp_systolic}/${r.bp_diastolic}` 
                                                        : <span className="text-gray-400">N/A</span>}
                                                </td>
                                                <td className="p-3 font-mono">{r.bmi}</td>
                                                <td className={`p-3 ${getBMICategoryColor(r.category)}`}>{r.category}</td>
                                                <td className="p-3 text-xs text-gray-500 italic">
                                                    {r.weight_diff_to_normal > 0 ? (
                                                        <span className="text-orange-500">Lose {r.weight_diff_to_normal} kg for normal weight</span>
                                                    ) : r.weight_diff_to_normal < 0 ? (
                                                        <span className="text-yellow-600">Gain {Math.abs(r.weight_diff_to_normal)} kg for normal weight</span>
                                                    ) : "Maintain current weight"}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* Pagination */}
                            <div className="flex justify-between items-center mt-4">
                                <button 
                                    disabled={healthPage === 0}
                                    onClick={() => setHealthPage(healthPage - 1)}
                                    className="text-sm px-4 py-1 border rounded bg-white disabled:opacity-50"
                                >
                                    Previous
                                </button>
                                <span className="text-xs text-gray-400">Page {healthPage + 1}</span>
                                <button 
                                    disabled={healthRecords.length < 5}
                                    onClick={() => setHealthPage(healthPage + 1)}
                                    className="text-sm px-4 py-1 border rounded bg-white disabled:opacity-50"
                                >
                                    Next
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div className="bg-white p-8 rounded-lg shadow-xl max-w-sm w-full">
                        <h1 className="text-2xl font-bold text-center text-blue-600 mb-8">Personal Monitor Login</h1>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Username</label>
                                <input 
                                    type="text" 
                                    required 
                                    className="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Password</label>
                                <input 
                                    type="password" 
                                    required 
                                    className="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                />
                            </div>
                            {error && <p className="text-red-500 text-sm">{error}</p>}
                            <button 
                                type="submit"
                                disabled={isLoading}
                                className={`w-full font-bold py-2 px-4 rounded transition duration-200 ${
                                    isLoading 
                                    ? 'bg-blue-400 cursor-not-allowed text-gray-100' 
                                    : 'bg-blue-600 hover:bg-blue-700 text-white'
                                }`}
                            >
                                {isLoading ? (
                                    <span className="flex items-center justify-center">
                                        <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        Logging in...
                                    </span>
                                ) : 'Login'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
